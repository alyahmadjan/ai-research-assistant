services:
  - type: web
    name: research-assistant-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: OPENAI_API_KEY
        sync: false        # set manually in Render dashboard
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/chroma_db
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app  # update after deploying frontend
    disk:
      name: chroma-storage
      mountPath: /opt/render/project/src/chroma_db
      sizeGB: 1
